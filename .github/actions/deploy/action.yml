name: 'Deploy Application'
description: 'Composite action to build and deploy Docker container'

inputs:
  image-name:
    description: 'Docker image name'
    required: true
  image-tag:
    description: 'Docker image tag'
    required: true
  environment:
    description: 'Deployment environment (staging or production)'
    required: true
  deploy-token:
    description: 'Deployment authentication token'
    required: true
  health-check-url:
    description: 'URL to check after deployment'
    required: false
    default: 'http://localhost:3001/health'

outputs:
  deploy-status:
    description: 'Deployment status (success or failure)'
    value: ${{ steps.health-check.outputs.status }}

runs:
  using: 'composite'
  steps:
    - name: Build Docker image
      shell: bash
      run: |
        echo "Building Docker image: ${{ inputs.image-name }}:${{ inputs.image-tag }}"
        docker build -t ${{ inputs.image-name }}:${{ inputs.image-tag }} .
        echo "Docker image built successfully"

    - name: Tag Docker image
      shell: bash
      run: |
        docker tag ${{ inputs.image-name }}:${{ inputs.image-tag }} ${{ inputs.image-name }}:latest
        echo "Tagged as ${{ inputs.image-name }}:latest"

    - name: Stop existing container
      shell: bash
      run: |
        docker stop app-${{ inputs.environment }} 2>/dev/null || true
        docker rm app-${{ inputs.environment }} 2>/dev/null || true

    - name: Deploy container
      shell: bash
      run: |
        docker run -d \
          --name app-${{ inputs.environment }} \
          -p 3001:3001 \
          -e NODE_ENV=${{ inputs.environment }} \
          --restart unless-stopped \
          ${{ inputs.image-name }}:${{ inputs.image-tag }}
        echo "Container deployed for ${{ inputs.environment }}"

    - name: Wait for container startup
      shell: bash
      run: sleep 10

    - name: Health check
      id: health-check
      shell: bash
      run: |
        echo "Running health check on ${{ inputs.health-check-url }}"
        MAX_RETRIES=5
        RETRY_COUNT=0
        while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ inputs.health-check-url }} 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Health check passed (HTTP $HTTP_STATUS)"
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          fi
          RETRY_COUNT=$((RETRY_COUNT + 1))
          echo "Health check attempt $RETRY_COUNT/$MAX_RETRIES failed (HTTP $HTTP_STATUS). Retrying..."
          sleep 5
        done
        echo "Health check failed after $MAX_RETRIES attempts"
        echo "status=failure" >> $GITHUB_OUTPUT
        exit 1
