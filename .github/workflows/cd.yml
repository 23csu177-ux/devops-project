###############################################################################
# CD Workflow - Continuous Deployment Pipeline
# Trigger: push to develop (staging), push to main (production)
# Deploys to staging or production based on branch
###############################################################################

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - develop
      - main

# Prevent parallel deployments
concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Download CI Artifact (do NOT rebuild)
  # ─────────────────────────────────────────────────────────────
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      target-env: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target environment
        id: set-env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: ./deploy
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Fallback build if no artifact
        if: failure() || steps.download.outcome == 'failure'
        run: |
          echo "No CI artifact found, building from source..."
          cp -r src/backend deploy/src/backend 2>/dev/null || mkdir -p deploy/src/backend
          cp package.json deploy/ 2>/dev/null || true
          cp version.txt deploy/ 2>/dev/null || true
          cp Dockerfile deploy/ 2>/dev/null || true

      - name: Upload deployment bundle
        uses: actions/upload-artifact@v4
        with:
          name: deploy-bundle-${{ steps.set-env.outputs.environment }}
          path: ./deploy/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 2: Deploy to Staging (develop branch)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare]
    if: github.ref_name == 'develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle-staging
          path: ./deploy

      - name: Deploy to staging
        uses: ./.github/actions/deploy
        with:
          image-name: devops-app
          image-tag: staging-latest
          environment: staging
          deploy-token: ${{ secrets.DEPLOY_TOKEN }}
          health-check-url: http://localhost:3001/health

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke test FAILED: /health returned HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test PASSED: /health returned HTTP 200"

          RESPONSE=$(curl -s http://localhost:3001/ 2>/dev/null || echo "{}")
          echo "Root endpoint response: $RESPONSE"
          echo "Staging deployment verified successfully"

  # ─────────────────────────────────────────────────────────────
  # Job 3: Deploy to Production (main branch, with approval gate)
  # ─────────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare]
    if: github.ref_name == 'main'
    environment:
      name: production
      url: http://localhost:3001
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download deployment bundle
        uses: actions/download-artifact@v4
        with:
          name: deploy-bundle-production
          path: ./deploy

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version $VERSION to production"

      - name: Deploy to production
        id: deploy
        uses: ./.github/actions/deploy
        with:
          image-name: devops-app
          image-tag: v${{ steps.version.outputs.version }}
          environment: production
          deploy-token: ${{ secrets.DEPLOY_TOKEN }}
          health-check-url: http://localhost:3001/health

      - name: Production smoke test
        id: smoke-test
        run: |
          echo "Running production smoke tests..."
          sleep 5
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Production smoke test FAILED: /health returned HTTP $HTTP_STATUS"
            echo "result=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "result=success" >> $GITHUB_OUTPUT
          echo "Production smoke test PASSED"

  # ─────────────────────────────────────────────────────────────
  # Job 4: Rollback on failure
  # ─────────────────────────────────────────────────────────────
  rollback-on-failure:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && github.ref_name == 'main'
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger rollback
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rollback.yml',
              ref: 'main',
              inputs: {
                reason: 'Automated rollback: production health check failed',
                failed_version: '${{ needs.deploy-production.outputs.version || 'unknown' }}'
              }
            });
            console.log('Rollback workflow triggered');

      - name: Comment on PR about failure
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 1
            });
            if (prs.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prs[0].number,
                body: `## ⚠️ Production Deployment Failed\n\n**Commit:** ${context.sha}\n**Reason:** Health check failed after deployment\n**Action:** Automatic rollback triggered\n**Time:** ${new Date().toISOString()}\n\nPlease investigate the deployment failure and fix before re-deploying.`
              });
            }
