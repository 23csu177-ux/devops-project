###############################################################################
# CI Workflow - Continuous Integration Pipeline
# Trigger: push to feature/* branches, pull_request to main
# Jobs: lint, test, coverage, matrix build (Node 16 & 18)
###############################################################################

name: CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
  pull_request:
    branches:
      - main

# Cancel redundant runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Lint
  # ─────────────────────────────────────────────────────────────
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '18'

      - name: Run ESLint on backend
        run: npx eslint src/backend/ --ext .js

  # ─────────────────────────────────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '18'

      - name: Run unit tests
        run: npm run test:ci

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3: Coverage Check (FAIL if < 80%)
  # ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: '18'

      - name: Run tests with coverage
        run: npm run test:ci

      - name: Check coverage threshold (80%)
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters=json-summary --forceExit 2>/dev/null; cat coverage/coverage-summary.json | node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/dev/stdin', 'utf8'));
            const total = data.total;
            const avg = (total.lines.pct + total.statements.pct + total.branches.pct + total.functions.pct) / 4;
            console.log(avg.toFixed(2));
          ")
          echo "Average coverage: ${COVERAGE}%"
          node -e "
            const coverage = parseFloat('${COVERAGE}');
            if (coverage < 80) {
              console.error('Coverage ${COVERAGE}% is below 80% threshold');
              process.exit(1);
            } else {
              console.log('Coverage ${COVERAGE}% meets the 80% threshold');
            }
          "

  # ─────────────────────────────────────────────────────────────
  # Job 4: Matrix Build (Node 16 & 18)
  # ─────────────────────────────────────────────────────────────
  matrix-build:
    name: Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [16, 18]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build backend
        run: |
          echo "Building with Node ${{ matrix.node-version }}"
          node -e "console.log('Build verification passed on Node ' + process.version)"

      - name: Build frontend
        working-directory: src/frontend
        run: |
          npm ci
          REACT_APP_VERSION=$(cat ../../version.txt) REACT_APP_ENV=ci npm run build

      - name: Upload build artifact
        if: matrix.node-version == 18
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: |
            src/backend/
            src/frontend/build/
            package.json
            package-lock.json
            version.txt
            Dockerfile
            .dockerignore
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # Final gate: all CI jobs must pass
  # ─────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, coverage, matrix-build]
    steps:
      - name: CI passed
        run: echo "All CI checks passed successfully"
