###############################################################################
# Release Workflow - Semantic Versioning & GitHub Releases
# Trigger: push to main, or workflow_call (reusable)
# Auto-bumps version based on commit messages, creates tag and release
###############################################################################

name: Release Pipeline

on:
  push:
    branches:
      - main
  workflow_call:
    outputs:
      new-version:
        description: 'The new semantic version'
        value: ${{ jobs.release.outputs.new-version }}
      tag:
        description: 'The created git tag'
        value: ${{ jobs.release.outputs.tag }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      bump-type: ${{ steps.bump.outputs.bump_type }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Read current version
        id: current
        run: |
          CURRENT_VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Determine version bump from commits
        id: bump
        run: |
          CURRENT_VERSION="${{ steps.current.outputs.version }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Get commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="%s")
          fi

          echo "Analyzing commits:"
          echo "$COMMITS"

          BUMP_TYPE="patch"

          # Check for BREAKING CHANGE → major bump
          if echo "$COMMITS" | grep -qi "BREAKING CHANGE\|BREAKING-CHANGE\|!:"; then
            BUMP_TYPE="major"
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          # Check for feat: → minor bump
          elif echo "$COMMITS" | grep -qi "^feat\|^feat("; then
            BUMP_TYPE="minor"
            MINOR=$((MINOR + 1))
            PATCH=0
          # Default (fix:, chore:, etc.) → patch bump
          else
            BUMP_TYPE="patch"
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEW_VERSION}"

          echo "Bump type: $BUMP_TYPE"
          echo "New version: $NEW_VERSION"
          echo "Tag: $TAG"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT

      - name: Update version.txt
        run: |
          echo "${{ steps.bump.outputs.new_version }}" > version.txt
          cat version.txt

      - name: Generate release notes
        id: release-notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --format="- %s (%h)" | head -50)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline --format="- %s (%h)")
          fi

          FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || echo "None")
          FIXES=$(echo "$COMMITS" | grep -i "^- fix" || echo "None")
          OTHERS=$(echo "$COMMITS" | grep -iv "^- feat\|^- fix" || echo "None")

          cat << NOTES > release_notes.md
          ## Release ${{ steps.bump.outputs.tag }}

          **Version:** ${{ steps.bump.outputs.new_version }}
          **Bump Type:** ${{ steps.bump.outputs.bump_type }}
          **Date:** $(date -u +"%Y-%m-%d %H:%M UTC")

          ### Features
          ${FEATURES}

          ### Bug Fixes
          ${FIXES}

          ### Other Changes
          ${OTHERS}

          ---
          *Automatically generated by the Release Pipeline*
          NOTES

          echo "Release notes generated"
          cat release_notes.md

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      - name: Create Git tag
        run: |
          git tag -a ${{ steps.bump.outputs.tag }} -m "Release ${{ steps.bump.outputs.tag }}"
          git push origin ${{ steps.bump.outputs.tag }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.bump.outputs.tag }}',
              name: 'Release ${{ steps.bump.outputs.tag }}',
              body: releaseNotes,
              draft: false,
              prerelease: false
            });

            console.log(`Release created: ${release.data.html_url}`);
